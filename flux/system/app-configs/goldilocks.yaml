apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: goldilocks
  namespace: goldilocks-system
spec:
  interval: 1m
  chart:
    spec:
      chart: goldilocks
      version: 10.4.1
      sourceRef:
        kind: HelmRepository
        name: fairwinds
        namespace: flux-system
  values:
    image:
      repository: us-docker.pkg.dev/fairwinds-ops/oss/goldilocks
      tag: v4.15.1@sha256:244b52b53aa4bb56b53c50f5b6b617612619a8f76571bd1e21d7d8157b3aee9e
    controller:
      rbac:
        enableArgoproj: false
      flags:
        on-by-default: true
    dashboard:
      flags:
        on-by-default: true
      ingress:
        enabled: false
      httpRoute:
        enabled: true
        parentRefs:
          - group: gateway.networking.k8s.io
            kind: ListenerSet
            name: goldilocks
            namespace: goldilocks-system
            sectionName: https
        hostnames:
          - goldilocks.${SERVICE_DOMAIN}
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: goldilocks-gateway
  namespace: goldilocks-system
spec:
  interval: 1m
  chart:
    spec:
      chart: ./charts/gateway-route
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  values:
    name: goldilocks
    hostname: goldilocks.${SERVICE_DOMAIN}
