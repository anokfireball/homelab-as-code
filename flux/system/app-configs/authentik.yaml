apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
  namespace: authentik
spec:
  interval: 1m
  chart:
    spec:
      chart: authentik
      version: 2026.5.2
      sourceRef:
        kind: HelmRepository
        name: goauthentik
        namespace: flux-system
  values:
    authentik:
      existingSecret: authentik-secrets
      error_reporting:
        enabled: false
    server:
      ingress:
        enabled: true
        ingressClassName: nginx
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt
          nginx.ingress.kubernetes.io/proxy-buffer-size: 16k
        hosts:
          - auth.${SERVICE_DOMAIN}
        tls:
          - secretName: authentik-tls
            hosts:
              - auth.${SERVICE_DOMAIN}
    postgresql:
      enabled: true
      auth:
        username: authentik
        password: authentik
        database: authentik
      primary:
        persistence:
          enabled: true
          storageClass: cluster-scratch
