apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: scrutiny-influxdb
  namespace: monitoring-system
spec:
  interval: 1m
  chart:
    spec:
      chart: influxdb2
      version: 2.1.2
      sourceRef:
        kind: HelmRepository
        name: influxdata
        namespace: flux-system
  values:
    service:
      port: 8086
    adminUser:
      organization: scrutiny
      bucket: metrics
      user: admin
      existingSecret: scrutiny-influxdb-admin
    persistence:
      enabled: true
      storageClass: nas-replicated-hdd
      size: 50Gi
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: scrutiny-web
  namespace: monitoring-system
spec:
  interval: 1m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      hub:
        containers:
          web:
            image:
              repository: ghcr.io/starosdev/scrutiny
              tag: latest-web@sha256:4bf1d7c1bac250537f476f7de89b7dc3c889579144a5cc36a8a5abfaed852aa4
            env:
              - name: SCRUTINY_WEB_INFLUXDB_HOST
                value: scrutiny-influxdb-influxdb2
              - name: SCRUTINY_WEB_INFLUXDB_TOKEN
                valueFrom:
                  secretKeyRef:
                    name: scrutiny-influxdb-admin
                    key: admin-token
              - name: SCRUTINY_WEB_METRICS_ENABLED
                value: "true"
    service:
      main:
        controller: hub
        ports:
          http:
            port: 8080
    ingress:
      main:
        enabled: false
    route:
      main:
        enabled: true
        kind: HTTPRoute
        parentRefs:
          - group: gateway.networking.k8s.io
            kind: ListenerSet
            name: scrutiny-web
            namespace: monitoring-system
            sectionName: https
        hostnames:
          - scrutiny.${SERVICE_DOMAIN}
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - identifier: main
    persistence:
      config:
        type: persistentVolumeClaim
        storageClass: cluster-replicated
        accessMode: ReadWriteOnce
        size: 1Gi
        globalMounts:
          - path: /opt/scrutiny/config
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: scrutiny-collector
  namespace: monitoring-system
spec:
  interval: 1m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    global:
      alwaysAppendIdentifierToResourceName: true
    defaultPodOptions:
      tolerations:
        - operator: Exists
    controllers:
      spoke:
        type: daemonset
        containers:
          collector:
            image:
              repository: ghcr.io/starosdev/scrutiny
              tag: latest-collector@sha256:0bff11c2f29758c76474867fe9270ec72c7e5bca8e8cfaa621d7b1dbb9fd5747
            env:
              - name: COLLECTOR_API_ENDPOINT
                value: http://scrutiny-web:8080
              - name: COLLECTOR_CRON_SCHEDULE
                value: "*/15 * * * *"
              - name: COLLECTOR_HOST_ID
                valueFrom:
                  fieldRef:
                    fieldPath: spec.nodeName
            securityContext:
              privileged: true
              capabilities:
                add:
                  - SYS_RAWIO # SATA
                  - SYS_ADMIN # NVMe
    configMaps:
      config:
        data:
          collector.yaml: |
            allow_listed_devices:
            - /dev/sda
            - /dev/nvme0
    persistence:
      config:
        type: configMap
        name: scrutiny-collector-config
        globalMounts:
          - path: /opt/scrutiny/config/collector.yaml
            subPath: collector.yaml
      udev:
        type: hostPath
        hostPath: /run/udev
        globalMounts:
          - path: /run/udev
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: scrutiny-tls
  namespace: envoy-gateway-system
spec:
  secretName: scrutiny-tls
  dnsNames:
    - scrutiny.${SERVICE_DOMAIN}
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt
---
apiVersion: gateway.networking.k8s.io/v1
kind: ListenerSet
metadata:
  name: scrutiny-web
  namespace: monitoring-system
spec:
  parentRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: shared
    namespace: envoy-gateway-system
  listeners:
    - name: https
      hostname: scrutiny.${SERVICE_DOMAIN}
      port: 443
      protocol: HTTPS
      allowedRoutes:
        namespaces:
          from: All
      tls:
        mode: Terminate
        certificateRefs:
          - group: ""
            kind: Secret
            name: scrutiny-tls
            namespace: envoy-gateway-system
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: scrutiny-web-listenerset-to-scrutiny-tls
  namespace: envoy-gateway-system
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: ListenerSet
      namespace: monitoring-system
  to:
    - group: ""
      kind: Secret
      name: scrutiny-tls
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: scrutiny-web-http-redirect
  namespace: monitoring-system
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: shared
      namespace: envoy-gateway-system
      sectionName: http
  hostnames:
    - scrutiny.${SERVICE_DOMAIN}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
