apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: envoy-gateway
  namespace: envoy-gateway-system
spec:
  interval: 1m
  dependsOn:
    - name: envoy-gateway-crds
      namespace: envoy-gateway-system
  chart:
    spec:
      chart: gateway-helm
      version: v1.7.1
      sourceRef:
        kind: HelmRepository
        name: envoy-gateway
        namespace: flux-system
  install:
    crds: Skip
  upgrade:
    crds: Skip
