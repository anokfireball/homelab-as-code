apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: envoy-gateway
  namespace: envoy-gateway-system
spec:
  interval: 1m
  chart:
    spec:
      chart: gateway-helm
      version: 1.7.2
      sourceRef:
        kind: HelmRepository
        name: envoy-gateway
        namespace: flux-system
  values:
    config:
      envoyGateway:
        gatewayAPI:
          enabled:
            - XListenerSet
  install:
    crds: Skip
  upgrade:
    crds: Skip
