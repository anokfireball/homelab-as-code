apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rss-bridge
  namespace: default
spec:
  interval: 1m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    global:
      alwaysAppendIdentifierToResourceName: true
    controllers:
      main:
        containers:
          main:
            image:
              repository: ghcr.io/rss-bridge/rss-bridge
              tag: latest@sha256:3a884925eb3001c8ff577bd4ef156d6a606ad01d36ef2daddef8c4775e943187
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
    configMaps:
      config:
        data:
          config.ini.php: |
            ; <?php exit; ?> DO NOT REMOVE THIS LINE
            [system]
            timezone = "Europe/Berlin"
            [error]
            output = "http"
    service:
      main:
        controller: main
        ports:
          http:
            port: 80
    ingress:
      main:
        enabled: false
    route:
      main:
        enabled: true
        kind: HTTPRoute
        parentRefs:
          - group: gateway.networking.k8s.io
            kind: ListenerSet
            name: rss-bridge
            namespace: default
            sectionName: https
        hostnames:
          - rssbridge.${SERVICE_DOMAIN}
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - identifier: main
    persistence:
      config:
        type: configMap
        name: rss-bridge-config
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rss-bridge-gateway
  namespace: default
spec:
  interval: 1m
  chart:
    spec:
      chart: ./charts/gateway-route
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  values:
    name: rss-bridge
    hostname: rssbridge.${SERVICE_DOMAIN}
