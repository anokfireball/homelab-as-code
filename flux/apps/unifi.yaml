apiVersion: mongodbcommunity.mongodb.com/v1
kind: MongoDBCommunity
metadata:
  name: unifi-mongodb
  namespace: default
spec:
  # Keep this single-member ReplicaSet minimal for Unifi; expand later only if needed.
  members: 1
  type: ReplicaSet
  version: "8.2.6"
  security:
    authentication:
      modes:
        - SCRAM
  users:
    - name: unifi-admin
      db: admin
      passwordSecretRef:
        name: unifi-secrets
        key: mongodb-root-password
      roles:
        - name: root
          db: admin
      scramCredentialsSecretName: unifi-admin-scram
    - name: unifi
      db: admin
      passwordSecretRef:
        name: unifi-secrets
        key: mongodb-password
      roles:
        - name: dbOwner
          db: unifi
        - name: dbOwner
          db: unifi_stat
        - name: dbOwner
          db: unifi_audit
      scramCredentialsSecretName: unifi-scram
  statefulSet:
    spec:
      serviceName: unifi-mongodb-svc
      volumeClaimTemplates:
        - metadata:
            name: data-volume
          spec:
            accessModes:
              - ReadWriteOnce
            storageClassName: cluster-replicated
            resources:
              requests:
                storage: 2Gi
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: unifi-controller
  namespace: default
spec:
  interval: 1m
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    defaultPodOptions:
      annotations:
        k8up.io/backup: "true"
        k8up.io/backupcommand: sh -c 'cat "$(ls -t /config/data/backup/*.unf | head -n1)"'
        k8up.io/file-extension: .unf
        k8up.io/backupcommand-container: main
      labels:
        backup: unifi-data
    controllers:
      main:
        containers:
          main:
            image:
              repository: ghcr.io/linuxserver/unifi-network-application
              tag: 10.1.89@sha256:e0b1471f50a338b20d3081cd62e3ecf596024bd0ded90f171207adeb7c499308
            env:
              TZ: Europe/Berlin
              MONGO_HOST: unifi-mongodb-svc
              MONGO_PORT: 27017
              MONGO_USER: unifi
              MONGO_PASS:
                valueFrom:
                  secretKeyRef:
                    name: unifi-secrets
                    key: mongodb-password
              MONGO_DBNAME: unifi
              MONGO_AUTHSOURCE: admin
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /setup/
                    port: 8080
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /setup/
                    port: 8080
            resources:
              requests:
                cpu: 20m
                memory: 800Mi
    service:
      external:
        controller: main
        type: LoadBalancer
        annotations:
          metallb.io/allow-shared-ip: default
          metallb.io/address-pool: default-vip
        ports:
          controller:
            port: 8080
            protocol: HTTP
          speedtest:
            port: 6789
            protocol: TCP
          stun:
            port: 3478
            protocol: UDP
          syslog:
            port: 5514
            protocol: UDP
          discovery:
            port: 10001
            protocol: UDP
          l2discovery:
            port: 1900
            protocol: UDP
      internal:
        controller: main
        ports:
          https:
            port: 8443
            protocol: HTTPS
    ingress:
      main:
        className: nginx
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt
          nginx.ingress.kubernetes.io/backend-protocol: HTTPS
          nginx.ingress.kubernetes.io/proxy-ssl-verify: "off"
        hosts:
          - host: unifi.${SERVICE_DOMAIN}
            paths:
              - path: /
                service:
                  identifier: internal
                  port: https
        tls:
          - secretName: unifi-tls
            hosts:
              - unifi.${SERVICE_DOMAIN}
    persistence:
      config:
        type: persistentVolumeClaim
        storageClass: cluster-replicated
        accessMode: ReadWriteOnce
        size: 2Gi
        globalMounts:
          - path: /config
---
apiVersion: k8up.io/v1
kind: Schedule
metadata:
  name: unifi-data
  namespace: default
spec:
  backend:
    repoPasswordSecretRef:
      name: k8up-restic-secrets
      key: restic-password
    s3:
      bucket: Brunette-Repeater-Founding8
  backup:
    labelSelectors:
      - matchLabels:
          backup: unifi-data
    schedule: "21 2 * * *"
    concurrentRunsAllowed: false
  prune:
    schedule: "51 0 1 * *"
    concurrentRunsAllowed: false
    retention:
      keepHourly: 6
      keepDaily: 14
      keepWeekly: 12
      keepMonthly: 6
      keepYearly: 2
