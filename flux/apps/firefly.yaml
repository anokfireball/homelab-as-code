---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: firefly-listenerset-to-firefly-tls
  namespace: envoy-gateway-system
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: ListenerSet
      namespace: default
  to:
    - group: ""
      kind: Secret
      name: firefly-tls
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
