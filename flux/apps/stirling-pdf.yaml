apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: stirling-pdf
  namespace: default
spec:
  interval: 1m
  chart:
    spec:
      chart: stirling-pdf-chart
      version: 3.1.0
      sourceRef:
        kind: HelmRepository
        name: stirling-pdf
        namespace: flux-system
  values:
    image:
      registry: ghcr.io
      repository: stirling-tools/stirling-pdf
      tag: 2.14.2-fat@sha256:aa91c68b85992986302fbdb6735f2c0824e329304e43c814a9b77c9dd0dbe410
    # https://docs.stirlingpdf.com/Configuration/
    envs:
      - name: SYSTEM_DEFAULTLOCALE
        value: de-DE
      - name: SYSTEM_SHOWUPDATE
        value: "false"
      - name: SYSTEM_GOOGLEVISIBILITY
        value: "false"
      - name: SYSTEM_ENABLEANALYTICS
        value: "false"
      - name: METRICS_ENABLED
        value: "false"
      - name: SECURITY_ENABLELOGIN
        value: "false"
    ingress:
      enabled: false
    resources:
      requests:
        cpu: 10m
        memory: 600Mi
    securityContext:
      enabled: false
    deployment:
      extraVolumes:
        - name: fonts-tmpfs
          emptyDir:
            medium: Memory
            sizeLimit: 100Mi
      extraVolumeMounts:
        - name: fonts-tmpfs
          mountPath: /usr/share/fonts/truetype
    probes:
      liveness:
        enabled: false
      readiness:
        enabled: false
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: stirling-pdf-gateway
  namespace: default
spec:
  interval: 1m
  chart:
    spec:
      chart: ./charts/gateway-route
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  values:
    name: stirling-pdf
    hostname: stirling-pdf.${SERVICE_DOMAIN}
    route:
      enabled: true
      backend:
        name: stirling-pdf-stirling-pdf-chart
        port: 8080
