apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: homepage-tls
  namespace: envoy-gateway-system
spec:
  secretName: homepage-tls
  dnsNames:
    - homepage.${SERVICE_DOMAIN}
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: homepage-listenerset-to-homepage-tls
  namespace: envoy-gateway-system
spec:
  from:
    - group: gateway.networking.x-k8s.io
      kind: XListenerSet
      namespace: default
  to:
    - group: ""
      kind: Secret
      name: homepage-tls
