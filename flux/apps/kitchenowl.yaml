apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: kitchenowl-postgresql
  namespace: default
spec:
  imageName: ghcr.io/cloudnative-pg/postgresql:17.2-27@sha256:9308dcd778be66f56bdce8503916ab820d12420e7d1bc74fff0d663c95e126c3
  instances: 1
  managed:
    services:
      disabledDefaultServices: ["ro", "r"]
    roles:
      - name: backup
        passwordSecret:
          name: postgres-backup-user
        login: true
        superuser: false
        inRoles:
          - pg_read_all_data
  bootstrap:
    initdb:
      database: kitchenowl
      owner: kitchenowl
      secret:
        name: kitchenowl-postgres-user
  storage:
    size: 2Gi
    storageClass: cluster-replicated
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kitchenowl
  namespace: default
spec:
  interval: 1m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      main:
        containers:
          frontend:
            image:
              repository: tombursch/kitchenowl-web
              tag: v0.7.8@sha256:517f808eee661307608d30fac70732d1647bb8bdf783a452065570ac1f8c3c40
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
            env:
              - name: BACK_URL
                value: localhost:5000
          backend:
            image:
              repository: tombursch/kitchenowl-backend
              tag: v0.7.9@sha256:e69f6bf74c93ad2e26145186f34682072746c6b845968b7ea2c06da5b352dce9
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
            env:
              - name: JWT_SECRET_KEY
                valueFrom:
                  secretKeyRef:
                    name: kitchenowl-secrets
                    key: JWT_SECRET_KEY
              - name: DB_DRIVER
                value: postgresql
              - name: DB_HOST
                value: kitchenowl-postgresql-rw
              - name: DB_NAME
                value: kitchenowl
              - name: DB_USER
                valueFrom:
                  secretKeyRef:
                    name: kitchenowl-postgres-user
                    key: username
              - name: DB_PASSWORD
                valueFrom:
                  secretKeyRef:
                    name: kitchenowl-postgres-user
                    key: password
              - name: FRONT_URL
                value: https://kitchenowl.${SERVICE_DOMAIN}
              - name: EMAIL_MANDATORY
                value: "true"
              - name: SMTP_HOST
                value: ${SMTP_HOST}
              - name: SMTP_USER
                valueFrom:
                  secretKeyRef:
                    name: kitchenowl-secrets
                    key: SMTP_USER
              - name: SMTP_PASS
                valueFrom:
                  secretKeyRef:
                    name: kitchenowl-secrets
                    key: SMTP_PASS
              - name: SMTP_FROM
                value: kitchenowl@${SERVICE_DOMAIN}
              - name: SMTP_REPLY_TO
                value: kitchenowl@${SERVICE_DOMAIN}
    service:
      main:
        controller: main
        ports:
          http:
            port: 80
    ingress:
      main:
        enabled: false
    route:
      main:
        enabled: true
        kind: HTTPRoute
        parentRefs:
          - group: gateway.networking.k8s.io
            kind: ListenerSet
            name: kitchenowl
            namespace: default
            sectionName: https
        hostnames:
          - kitchenowl.${SERVICE_DOMAIN}
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - identifier: main
    persistence:
      data:
        type: persistentVolumeClaim
        storageClass: cluster-replicated
        accessMode: ReadWriteOnce
        size: 5Gi
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: kitchenowl-tls
  namespace: envoy-gateway-system
spec:
  secretName: kitchenowl-tls
  dnsNames:
    - kitchenowl.${SERVICE_DOMAIN}
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt
---
apiVersion: gateway.networking.k8s.io/v1
kind: ListenerSet
metadata:
  name: kitchenowl
  namespace: default
spec:
  parentRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: shared
    namespace: envoy-gateway-system
  listeners:
    - name: https
      hostname: kitchenowl.${SERVICE_DOMAIN}
      port: 443
      protocol: HTTPS
      allowedRoutes:
        namespaces:
          from: All
      tls:
        mode: Terminate
        certificateRefs:
          - group: ""
            kind: Secret
            name: kitchenowl-tls
            namespace: envoy-gateway-system
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: kitchenowl-listenerset-to-kitchenowl-tls
  namespace: envoy-gateway-system
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: ListenerSet
      namespace: default
  to:
    - group: ""
      kind: Secret
      name: kitchenowl-tls
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kitchenowl-http-redirect
  namespace: default
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: shared
      namespace: envoy-gateway-system
      sectionName: http
  hostnames:
    - kitchenowl.${SERVICE_DOMAIN}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
